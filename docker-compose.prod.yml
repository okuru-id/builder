services:
  postgres:
    image: postgres:17-alpine
    container_name: okuru-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: okuruid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    image: ${IMAGE:-registry.gitlab.com/kurob1993/okuru}:latest
    container_name: okuru-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: okuruid
      DB_USERNAME: postgres
      DB_PASSWORD: password
    volumes:
      - storage-data:/opt/okuru/storage/app/public
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
  storage-data:
