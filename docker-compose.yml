services:
  postgres:
    image: postgres:17-alpine
    container_name: okuru-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: okuruid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: okuru-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage-data:/opt/okuru/storage/app/public
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
  storage-data:
