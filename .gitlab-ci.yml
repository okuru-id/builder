stages:
  - lint
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

lint:go:
  stage: lint
  image: golangci/golangci-lint:v1.61-alpine
  script:
    - cd backend && golangci-lint run --timeout 5m ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

build:image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

.deploy_template: &deploy_template
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$VPS_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$VPS_SSH_FINGERPRINT" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$VPS_USER@$VPS_HOST" << 'EOF'
        set -e
        cd /opt/okuru
        docker compose -f docker-compose.prod.yml pull app
        docker compose -f docker-compose.prod.yml up -d --remove-orphans app
        docker compose -f docker-compose.prod.yml exec -T app ./artisan migrate --force
        docker image prune -f
      EOF

deploy:staging:
  <<: *deploy_template
  stage: deploy
  environment:
    name: staging
    url: https://staging.okuru.id
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success

deploy:production:
  <<: *deploy_template
  stage: deploy
  environment:
    name: production
    url: https://api.okuru.id
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
