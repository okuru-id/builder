services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: okuru-app
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
    volumes:
      - db-data:/var/lib/okuru
      - storage-data:/opt/okuru/storage/app/public
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
  storage-data:
